<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Monitor — Поиск товаров</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAV -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                    <polyline points="17 6 23 6 23 12" />
                </svg>
                Поиск товаров
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">Дашборд</a>
                <a href="#" class="nav-link">История</a>
                <a href="#" class="nav-link">Настройки</a>
                <div class="nav-avatar">П</div>
            </div>
        </div>
    </nav>

    <!-- HERO HEADER -->
    <section class="hero">
        <h1> Поиск товаров</h1>
        <p class="hero-sub">Мониторинг цен на российских маркетплейсах</p>

        <!-- Marketplace toggle -->
        <div class="mp-toggle">
            <button class="mp-btn active" id="btnAvito" onclick="setMarketplace('avito')">Авито</button>
            <button class="mp-btn" id="btnYandex" onclick="setMarketplace('yandex')">Яндекс Маркет</button>
            <button class="mp-btn" id="btnOzon" onclick="setMarketplace('ozon')">Ozon</button>
            <button class="mp-btn" id="btnWb" onclick="setMarketplace('wb')">Wildberries</button>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- Search card -->
        <div class="search-card">
            <form id="searchForm">

                <!-- Search input -->
                <div class="search-row">
                    <span class="search-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <input type="text" id="searchQuery" placeholder="Введите название товара" required
                        autocomplete="off">
                    <button type="submit" id="searchBtn">
                        <span class="btn-text">Найти</span>
                        <span class="loader-btn" style="display:none;"></span>
                    </button>
                </div>

                <!-- Filter row -->
                <div class="filters-row">
                    <div class="filter-col" id="cityFilterCol">
                        <label class="filter-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                            Город
                        </label>
                        <select id="city" class="filter-select">
                            <option value="kazan" selected>Казань</option>
                            <option value="moskva">Москва</option>
                            <option value="spb">Санкт-Петербург</option>
                            <option value="rossiya">Вся Россия</option>
                        </select>
                    </div>
                    <div class="filter-col">
                        <label class="filter-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="2" y="3" width="20" height="14" rx="2" />
                                <line x1="8" y1="21" x2="16" y2="21" />
                                <line x1="12" y1="17" x2="12" y2="21" />
                            </svg>
                            Количество
                        </label>
                        <select id="maxResults" class="filter-select">
                            <option value="5">5 объявлений</option>
                            <option value="10">10 объявлений</option>
                            <option value="20">20 объявлений</option>
                            <option value="50" selected>5 объявлений</option>
                        </select>
                    </div>
                    <div class="filter-col">
                        <label class="filter-label">
                            <span style="font-size:14px;font-weight:700;">₽</span>
                            Цена
                        </label>
                        <div class="price-range">
                            <input type="number" id="priceMin" class="price-input" placeholder="От" min="0">
                            <span class="price-dash">—</span>
                            <input type="number" id="priceMax" class="price-input" placeholder="До" min="0">
                        </div>
                    </div>
                </div>

                <!-- Excel bar -->
                <div class="excel-bar">
                    <span class="excel-info">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d6f42" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="2" />
                            <path d="M8 8l4 4 4-4M8 16l4-4 4 4" />
                        </svg>
                        Найдено записей: <strong id="recordCount">{{ row_count }}</strong>
                    </span>
                    <a href="/download_excel" class="excel-dl-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Скачать Excel
                    </a>
                </div>
            </form>
        </div>

        <!-- Error -->
        <div id="errorMessage" class="error-msg" style="display:none;"></div>

        <!-- Loading -->
        <div id="loadingIndicator" class="loading-row" style="display:none;">
            <div class="spin-ring"></div>
            <span>Ищем товары...</span>
        </div>

        <!-- Results -->
        <div id="resultsSection" class="results-wrap" style="display:none;">
            <div class="results-top">
                <div class="results-left">
                    <h2 class="results-title">Результаты поиска</h2>
                    <span id="resultsCount" class="count-pill"></span>
                </div>
                <div class="results-right">
                    <span id="excelSaved" class="saved-tag" style="display:none;">✅ Сохранено в Excel</span>
                    <a id="marketLink" href="#" target="_blank" class="market-btn" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                            <polyline points="15 3 21 3 21 9" />
                            <line x1="10" y1="14" x2="21" y2="3" />
                        </svg>
                        Открыть на Авито
                    </a>
                </div>
            </div>

            <!-- Фильтр по описанию -->
            <div class="description-filter">
                <div class="desc-filter-row">
                    <span class="desc-filter-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
                            <line x1="4" y1="21" x2="4" y2="14" />
                            <line x1="4" y1="10" x2="4" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="12" />
                            <line x1="12" y1="8" x2="12" y2="3" />
                            <line x1="20" y1="21" x2="20" y2="16" />
                            <line x1="20" y1="12" x2="20" y2="3" />
                            <line x1="1" y1="14" x2="7" y2="14" />
                            <line x1="9" y1="8" x2="15" y2="8" />
                            <line x1="17" y1="16" x2="23" y2="16" />
                        </svg>
                    </span>
                    <input type="text" id="descriptionFilter" placeholder="Фильтр по описанию: введите ключевые слова..." autocomplete="off">
                    <button type="button" id="clearFilterBtn" class="clear-filter-btn" style="display:none;" title="Очистить фильтр">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
                <div id="filterInfo" class="filter-info" style="display:none;"></div>
            </div>

            <div id="resultsContainer" class="results-grid"></div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p> 2026 Инструмент для анализа цен</p>

    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
